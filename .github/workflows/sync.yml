name: Sync context-king

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      version:
        description: 'Upstream tag (e.g. v1.8.9); blank = latest'
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Run sync
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            bash scripts/ck-update.sh --version "${{ inputs.version }}"
          else
            bash scripts/ck-update.sh
          fi

      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: sync context-king plugin to upstream"
          branch: auto/sync-context-king
          title: "chore: sync context-king plugin to upstream"
          body: |
            Automated sync of the context-king plugin payload from an upstream
            ContextKing release. Review the diff (skills, hooks, checksums,
            version pin) before merging.
          delete-branch: true
